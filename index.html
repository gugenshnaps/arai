<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>AR AI</title>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <!-- Single fixed wrapper — prevents long-page bug in Telegram WebView -->
    <div id="app">

      <!-- Camera background (normal mode) -->
      <video id="camera" autoplay playsinline muted></video>

      <!-- Three.js canvas overlay (normal mode) -->
      <canvas id="three-canvas"></canvas>

      <!-- 8th Wall SLAM canvas (hidden until user enters AR mode) -->
      <canvas id="xr-canvas" style="display:none"></canvas>

      <!-- UI Layer -->
      <div id="ui">
        <!-- Top header -->
        <div id="header">
          <div id="logo">AR <span>AI</span></div>
          <div id="status-dot"></div>
        </div>

        <!-- Status message -->
        <div id="status-bar">
          <span id="status-text">Инициализация...</span>
        </div>

        <!-- Transcript display -->
        <div id="transcript-box">
          <div id="user-text"></div>
          <div id="ai-text"></div>
        </div>

        <!-- Controls -->
        <div id="controls">
          <button id="talk-btn" aria-label="Говорить с AI" disabled>
            <span id="talk-icon">🎤</span>
            <span id="talk-label">TALK</span>
          </button>

          <!-- Text input fallback (shown when voice is unavailable) -->
          <div id="text-input-row" style="display:none">
            <input id="text-input" type="text" placeholder="Напиши сообщение..." autocomplete="off" />
            <button id="send-btn" aria-label="Отправить">→</button>
          </div>
        </div>
      </div>

    </div><!-- /#app -->

    <!-- Error trap: must be BEFORE the module script so it catches
         any import/parse errors that occur before main.js body runs -->
    <script>
      function _showErr(msg) {
        var st = document.getElementById('status-text');
        if (st) { st.textContent = String(msg).slice(0, 80); st.style.color = '#ff4466'; }
      }
      window.addEventListener('error', function(e) {
        _showErr('\u26a0 ' + (e.message || 'JS error'));
      });
      window.addEventListener('unhandledrejection', function(e) {
        var r = e.reason;
        _showErr('\u26a0 ' + (r && r.message ? r.message : String(r || 'Promise error')));
      });
      // Safety net: if nothing changed status after 10 s, the module never ran
      setTimeout(function() {
        var st = document.getElementById('status-text');
        if (st && st.textContent === 'Инициализация...') {
          st.textContent = '\u26a0 Обнови страницу (JS не загрузился)';
          st.style.color = '#ff4466';
        }
      }, 10000);
    </script>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
