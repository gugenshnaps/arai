<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>AR AI</title>
    <link rel="stylesheet" href="/style.css" />

    <!-- Bootstrap: runs before any module — shows progress on slow mobile -->
    <script>
      (function() {
        var INITIAL = 'Инициализация...';
        function st() { return document.getElementById('status-text'); }
        function setMsg(msg) {
          var el = st();
          if (el) { el.textContent = msg; el.style.color = ''; }
        }
        function showErr(msg) {
          var el = st();
          if (el) { el.textContent = String(msg).slice(0, 80); el.style.color = '#ff4466'; }
        }

        // Show loading immediately (before 750 KB Three.js downloads)
        document.addEventListener('DOMContentLoaded', function() {
          setMsg('Загрузка...');
        });

        window.addEventListener('error', function(e) {
          showErr('\u26a0 ' + (e.message || 'JS error'));
        });
        window.addEventListener('unhandledrejection', function(e) {
          var r = e.reason;
          showErr('\u26a0 ' + (r && r.message ? r.message : String(r || 'Promise error')));
        });

        // Progressive hints — NOT a hard failure at 10 s
        setTimeout(function() {
          var el = st();
          if (el && (el.textContent === INITIAL || el.textContent === 'Загрузка...')) {
            setMsg('Загрузка 3D... (подожди)');
          }
        }, 8000);

        setTimeout(function() {
          var el = st();
          if (el && el.textContent.indexOf('Загрузка') !== -1) {
            setMsg('Медленная сеть — ещё загружается...');
          }
        }, 20000);

        setTimeout(function() {
          var el = st();
          if (el && (el.textContent === INITIAL || el.textContent.indexOf('Загрузка') !== -1 || el.textContent.indexOf('Медленная') !== -1)) {
            showErr('\u26a0 Не загрузилось — обнови страницу');
          }
        }, 45000);
      })();
    </script>
  </head>
  <body>
    <!-- Single fixed wrapper — prevents long-page bug in Telegram WebView -->
    <div id="app">

      <!-- Camera background (normal mode) -->
      <video id="camera" autoplay playsinline muted></video>

      <!-- Three.js canvas overlay (normal mode) -->
      <canvas id="three-canvas"></canvas>

      <!-- 8th Wall SLAM canvas (hidden until user enters AR mode) -->
      <canvas id="xr-canvas" style="display:none"></canvas>

      <!-- UI Layer -->
      <div id="ui">
        <!-- Top header -->
        <div id="header">
          <div id="logo">AR <span>AI</span></div>
          <div id="status-dot"></div>
        </div>

        <!-- Status message -->
        <div id="status-bar">
          <span id="status-text">Инициализация...</span>
        </div>

        <!-- Transcript display -->
        <div id="transcript-box">
          <div id="user-text"></div>
          <div id="ai-text"></div>
        </div>

        <!-- Controls -->
        <div id="controls">
          <button id="talk-btn" aria-label="Говорить с AI" disabled>
            <span id="talk-icon">🎤</span>
            <span id="talk-label">TALK</span>
          </button>

          <!-- Text input fallback (shown when voice is unavailable) -->
          <div id="text-input-row" style="display:none">
            <input id="text-input" type="text" placeholder="Напиши сообщение..." autocomplete="off" />
            <button id="send-btn" aria-label="Отправить">→</button>
          </div>
        </div>
      </div>

    </div><!-- /#app -->

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
