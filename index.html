<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>AR AI</title>
    <link rel="stylesheet" href="/style.css" />
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />

    <!-- Three.js from CDN (~770 KB) — not bundled, loads in parallel, cached globally -->
    <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.184.0/build/three.module.js",
        "three/": "https://cdn.jsdelivr.net/npm/three@0.184.0/"
      }
    }
    </script>
    <link rel="modulepreload" crossorigin href="https://cdn.jsdelivr.net/npm/three@0.184.0/build/three.module.js" />

    <!-- Bootstrap: runs before any module -->
    <script>
      (function() {
        window.__ARAI_BOOT = false;
        window.__ARAI_READY = false;

        function st() { return document.getElementById('status-text'); }
        function setMsg(msg) {
          var el = st();
          if (el) { el.textContent = msg; el.style.color = ''; }
        }
        function showErr(msg) {
          var el = st();
          if (el) { el.textContent = String(msg).slice(0, 80); el.style.color = '#ff4466'; }
        }

        document.addEventListener('DOMContentLoaded', function() {
          var oldLoader = document.getElementById('avatar-loader');
          if (oldLoader) oldLoader.remove();
          setMsg('Загрузка...');
        });

        window.addEventListener('error', function(e) {
          if (window.__ARAI_READY) return;
          var msg = e.message || 'JS error';
          if (e.target && e.target.src) {
            msg = 'Не загрузился: ' + e.target.src.split('/').pop();
          }
          showErr('\u26a0 ' + msg);
        }, true);

        window.addEventListener('unhandledrejection', function(e) {
          if (window.__ARAI_READY) return;
          var r = e.reason;
          showErr('\u26a0 ' + (r && r.message ? r.message : String(r || 'Promise error')));
        });

        // Only show hints while app hasn't booted yet
        setTimeout(function() {
          if (!window.__ARAI_BOOT) setMsg('Загрузка JS...');
        }, 5000);

        setTimeout(function() {
          if (!window.__ARAI_BOOT) setMsg('Загрузка 3D... (подожди)');
        }, 15000);

        // Hard error only if main.js never started at all
        setTimeout(function() {
          if (!window.__ARAI_BOOT) {
            showErr('\u26a0 JS не стартовал — обнови страницу');
          }
        }, 60000);
      })();
    </script>
  </head>
  <body>
    <!-- Single fixed wrapper — prevents long-page bug in Telegram WebView -->
    <div id="app">

      <!-- Camera background (normal mode) -->
      <video id="camera" autoplay playsinline muted></video>

      <!-- Three.js canvas overlay (normal mode) -->
      <canvas id="three-canvas"></canvas>

      <!-- 8th Wall SLAM canvas (hidden until user enters AR mode) -->
      <canvas id="xr-canvas" style="display:none"></canvas>

      <!-- UI Layer -->
      <div id="ui">
        <!-- Top header -->
        <div id="header">
          <div id="logo">AR <span>AI</span></div>
          <div id="status-dot"></div>
        </div>

        <!-- Status message -->
        <div id="status-bar">
          <span id="status-text">Инициализация...</span>
        </div>

        <!-- Transcript display -->
        <div id="transcript-box">
          <div id="user-text"></div>
          <div id="ai-text"></div>
        </div>

        <!-- Controls -->
        <div id="controls">
          <button id="talk-btn" aria-label="Говорить с AI" disabled>
            <span id="talk-icon">🎤</span>
            <span id="talk-label">TALK</span>
          </button>

          <!-- Text input fallback (shown when voice is unavailable) -->
          <div id="text-input-row" style="display:none">
            <input id="text-input" type="text" placeholder="Напиши сообщение..." autocomplete="off" />
            <button id="send-btn" aria-label="Отправить">→</button>
          </div>
        </div>
      </div>

    </div><!-- /#app -->

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
